<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Neon Terminal</title>
<style>
body{margin:0;background:#050706;color:#b6ffbe;font:16px/1.5 ui-monospace,Menlo,Consolas,monospace}
.wrap{max-width:960px;margin:auto;padding:28px 18px}
.term{border:1px solid #1f5f2a;background:#061008;padding:18px;box-shadow:0 0 0 1px #0c2b12 inset,0 0 35px rgba(88,255,126,.08)}
.prompt{color:#74ff8f}.muted{color:#67b374}.cmd{color:#d4ffd8}.blink{animation:b 1s steps(1) infinite}@keyframes b{50%{opacity:0}}
a{color:#91ffd4}
</style></head>
<body><main class="wrap"><section class="term">

<div><span class="prompt">hawk@nullwind</span>:<span class="muted">~</span>$ <span class="cmd">ls flight-log/</span></div>

</section></main></body></html>
